<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AgentGraph – Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #020617;
      --panel: #0f172a;
      --text: #f9fafb;
      --muted: #94a3b8;
      --accent: #4f46e5;
      --accent-soft: rgba(79, 70, 229, 0.12);
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-pill: 999px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: radial-gradient(circle at top, #111827 0, #020617 45%, #000 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 32px 12px 40px;
    }

    .shell {
      width: 100%;
      max-width: 1040px;
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.96), rgba(3, 7, 18, 0.98));
      border-radius: 26px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.6);
      padding: 22px 22px 24px;
      position: relative;
      overflow: hidden;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-circle {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 20%, #a5b4fc, #4f46e5);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #020617;
      font-weight: 700;
      font-size: 14px;
    }

    .btn-ghost {
      border-radius: var(--radius-pill);
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: rgba(15, 23, 42, 0.9);
      color: var(--muted);
      font-size: 11px;
      padding: 6px 10px;
      text-decoration: none;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr);
      gap: 18px;
    }

    .task-input {
      width: 100%;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: rgba(15, 23, 42, 0.96);
      color: var(--text);
      padding: 8px 12px;
      font-size: 13px;
      outline: none;
    }

    .btn-primary {
      border: none;
      cursor: pointer;
      padding: 8px 14px;
      border-radius: var(--radius-pill);
      background: radial-gradient(circle at 0 0, #a5b4fc, #4f46e5);
      color: #f9fafb;
      font-size: 12px;
      font-weight: 500;
    }

    .panel {
      background: rgba(15, 23, 42, 0.96);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(148, 163, 184, 0.35);
      padding: 10px 11px 11px;
      margin-bottom: 10px;
    }

    .agent-card, .path-card {
      background: rgba(15, 23, 42, 0.96);
      border-radius: var(--radius-md);
      border: 1px solid rgba(148, 163, 184, 0.35);
      padding: 8px 9px;
      font-size: 11px;
      margin-bottom: 6px;
    }

    .path-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .path-btn {
      font-size: 10px;
      padding: 3px 7px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: rgba(15, 23, 42, 0.9);
      color: var(--muted);
      cursor: pointer;
    }

    /* MODAL PANEL (RIGHT SLIDE-IN) */
    #editorPanel {
      position: fixed;
      top: 0;
      right: -420px;
      width: 420px;
      height: 100vh;
      background: #0f172a;
      border-left: 1px solid rgba(148, 163, 184, 0.3);
      box-shadow: -4px 0 20px rgba(0,0,0,0.4);
      padding: 20px;
      transition: right 0.3s ease;
      z-index: 9999;
    }

    #editorPanel.open {
      right: 0;
    }

    .editor-title {
      font-size: 16px;
      margin-bottom: 12px;
    }

    .editor-section {
      margin-bottom: 14px;
    }

    .editor-input {
      width: 100%;
      padding: 8px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(148,163,184,0.4);
      background: rgba(15,23,42,0.9);
      color: var(--text);
      font-size: 13px;
    }

    .step-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid rgba(148,163,184,0.2);
    }

    .step-actions button {
      margin-left: 4px;
      font-size: 10px;
      padding: 3px 6px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(148,163,184,0.4);
      background: rgba(15,23,42,0.9);
      color: var(--muted);
      cursor: pointer;
    }

    .editor-footer {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }

    .btn-save {
      flex: 1;
      background: #4f46e5;
      border: none;
      padding: 10px;
      border-radius: var(--radius-md);
      color: white;
      cursor: pointer;
    }

    .btn-cancel {
      flex: 1;
      background: rgba(148,163,184,0.2);
      border: none;
      padding: 10px;
      border-radius: var(--radius-md);
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="shell">
    <div class="header-row">
      <div class="logo">
        <div class="logo-circle">A</div>
        <div>
          <div style="font-weight:600;font-size:13px;">AgentGraph · Demo</div>
          <div style="font-size:11px;color:var(--muted);">Describe a task → see agents and paths</div>
        </div>
      </div>
      <a href="index.html" class="btn-ghost">Back</a>
    </div>

    <div class="layout">
      <div>
        <input id="taskInput" class="task-input" placeholder="e.g., scrape a website and summarize it" />
        <button id="runButton" class="btn-primary" style="margin-top:8px;">Find agents & paths</button>

        <div class="panel" style="margin-top:12px;">
          <div style="font-size:12px;font-weight:500;margin-bottom:4px;">Try one:</div>
          <button class="path-btn example" data-task="Clean messy CSV data and turn it into charts">CSV → Charts</button>
          <button class="path-btn example" data-task="Scrape a website and summarize it into Notion">Scrape → Notion</button>
          <button class="path-btn example" data-task="Extract insights from a PDF and email them">PDF → Email</button>
          <button class="path-btn example" data-task="Generate an image and upload it to Google Drive">Image → Drive</button>
        </div>
      </div>

      <div>
        <div class="panel">
          <div style="font-size:12px;font-weight:500;margin-bottom:6px;">Relevant agents</div>
          <div id="agentsContainer"></div>
        </div>

        <div class="panel">
          <div style="font-size:12px;font-weight:500;margin-bottom:6px;">Suggested paths</div>
          <div id="pathsContainer"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT-SIDE EDITOR PANEL -->
  <div id="editorPanel">
    <div class="editor-title">Edit Workflow</div>

    <div class="editor-section">
      <label style="font-size:12px;">Workflow Name</label>
      <input id="editorName" class="editor-input" />
    </div>

    <div class="editor-section">
      <label style="font-size:12px;">Steps</label>
      <div id="editorSteps"></div>
    </div>

    <div class="editor-section">
      <label style="font-size:12px;">Add Step</label>
      <select id="editorAddStep" class="editor-input"></select>
      <button id="addStepBtn" class="btn-primary" style="margin-top:6px;width:100%;">Add</button>
    </div>

    <div class="editor-footer">
      <button id="saveWorkflow" class="btn-save">Save</button>
      <button id="cancelWorkflow" class="btn-cancel">Cancel</button>
    </div>
  </div>

  <script src="loader.js"></script>
</body>
</html>
